packages:
  - 'apps/*'
  - 'packages/*'

catalog:
  # Vue 生态 (升级到最新 3.5.x)
  vue: 3.5.13
  vue-router: 4.5.0
  pinia: 3.0.0
  '@vueuse/core': 12.0.0

  # UI 组件库
  element-plus: 2.9.7
  vant: 4.8.10
  '@element-plus/icons-vue': 2.3.2

  # 构建工具
  vite: 6.0.11
  typescript: 5.7.3
  vue-tsc: 2.2.0
  '@vitejs/plugin-vue': 5.2.1

  # Tailwind CSS
  tailwindcss: 4.0.0
  '@tailwindcss/postcss': 4.0.0
  postcss: 8.5.1
  autoprefixer: 10.4.20

  # ESLint
  eslint: 9.18.0
  '@eslint/js': 9.18.0
  '@typescript-eslint/eslint-plugin': 8.21.0
  '@typescript-eslint/parser': 8.21.0
  eslint-plugin-vue: 9.32.0
  eslint-config-prettier: 10.0.1
  globals: 15.14.0
  vue-eslint-parser: 9.4.3

  # Prettier
  prettier: 3.4.2

  # 测试
  vitest: 3.0.2
  '@vitest/ui': 3.0.2
  '@vue/test-utils': 2.4.6
  '@testing-library/vue': 8.1.0
  jsdom: 26.0.0

  # 其他工具
  axios: 1.7.9
  nprogress: 0.2.0
  '@types/nprogress': 0.2.3

  # 富文本编辑器
  '@tiptap/starter-kit': 2.11.5
  '@tiptap/vue-3': 2.11.5

  # 拖拽
  vue-draggable-plus: 0.6.1

  # 二维码
  qrcode.vue: 3.8.0

  # 自动导入
  unplugin-auto-import: 19.0.0
  unplugin-vue-components: 28.0.0

  # Turbo
  turbo: 2.3.3

  # Husky & lint-staged
  husky: 9.1.7
  lint-staged: 15.4.1

  # 工具库
  rimraf: 6.0.1

  # Vite 插件
  vite-plugin-dts: 4.5.0
