rules:
  - id: no-eval
    message: "Avoid eval(), it introduces code-injection risks."
    severity: ERROR
    languages:
      - javascript
      - typescript
    pattern: eval(...)

  - id: no-new-function
    message: "Avoid new Function(), it has eval-like security risks."
    severity: ERROR
    languages:
      - javascript
      - typescript
    pattern: new Function(...)

  - id: no-document-write
    message: "Avoid document.write(), it can open XSS risks and runtime instability."
    severity: ERROR
    languages:
      - javascript
      - typescript
    pattern: document.write(...)
